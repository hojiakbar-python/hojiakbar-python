<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="15">
  <!-- terminal window -->
  <rect x="1" y="1" width="818" height="258" rx="12" fill="#0d1117" stroke="#30363d"/>
  <!-- title bar -->
  <rect x="1" y="1" width="818" height="36" rx="12" fill="#161b22"/>
  <rect x="1" y="25" width="818" height="12" fill="#161b22"/>
  <line x1="1" y1="37" x2="819" y2="37" stroke="#30363d"/>
  <circle cx="24" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="19" r="6" fill="#27c93f"/>
  <text x="410" y="24" text-anchor="middle" fill="#8b949e" font-size="13">hojiakbar@blog: ~</text>

  <!-- line 1: whoami -->
  <g>
    <text x="24" y="68" fill="#7ee787">hojiakbar@blog</text>
    <text x="138" y="68" fill="#8b949e">:</text>
    <text x="145" y="68" fill="#79c0ff">~</text>
    <text x="155" y="68" fill="#8b949e">$</text>
    <g clip-path="url(#type1)">
      <text x="170" y="68" fill="#e6edf3">whoami</text>
    </g>
    <clipPath id="type1">
      <rect x="170" y="50" width="0" height="26">
        <animate attributeName="width" from="0" to="70" begin="0.6s" dur="0.7s" calcMode="discrete" values="0;12;24;36;48;60;70" fill="freeze"/>
      </rect>
    </clipPath>
  </g>

  <!-- output 1 -->
  <text x="24" y="96" fill="#e6edf3" opacity="0">
    Backend &amp; AI Developer <tspan fill="#8b949e">—</tspan> <tspan fill="#f2cc60">bots, APIs, AI integrations</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.2s" fill="freeze"/>
  </text>

  <!-- line 2: ls projects -->
  <g>
    <text x="24" y="132" fill="#7ee787" opacity="0">hojiakbar@blog<animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.05s" fill="freeze"/></text>
    <text x="138" y="132" fill="#8b949e" opacity="0">:<animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.05s" fill="freeze"/></text>
    <text x="145" y="132" fill="#79c0ff" opacity="0">~<animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.05s" fill="freeze"/></text>
    <text x="155" y="132" fill="#8b949e" opacity="0">$<animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.05s" fill="freeze"/></text>
    <g clip-path="url(#type2)">
      <text x="170" y="132" fill="#e6edf3">ls projects/</text>
    </g>
    <clipPath id="type2">
      <rect x="170" y="114" width="0" height="26">
        <animate attributeName="width" from="0" to="120" begin="2.3s" dur="0.9s" calcMode="discrete" values="0;20;40;60;80;100;120" fill="freeze"/>
      </rect>
    </clipPath>
  </g>

  <!-- output 2 -->
  <text x="24" y="160" opacity="0">
    <tspan fill="#79c0ff">kinesis/</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#79c0ff">ctc-crm/</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#79c0ff">drq/</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#79c0ff">hojiakbar.blog/</tspan><tspan fill="#e6edf3">  </tspan><tspan fill="#79c0ff">tahlil/</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.2s" fill="freeze"/>
  </text>

  <!-- line 3: stack -->
  <g>
    <text x="24" y="196" fill="#7ee787" opacity="0">hojiakbar@blog<animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.05s" fill="freeze"/></text>
    <text x="138" y="196" fill="#8b949e" opacity="0">:<animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.05s" fill="freeze"/></text>
    <text x="145" y="196" fill="#79c0ff" opacity="0">~<animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.05s" fill="freeze"/></text>
    <text x="155" y="196" fill="#8b949e" opacity="0">$<animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.05s" fill="freeze"/></text>
    <g clip-path="url(#type3)">
      <text x="170" y="196" fill="#e6edf3">cat stack.txt</text>
    </g>
    <clipPath id="type3">
      <rect x="170" y="178" width="0" height="26">
        <animate attributeName="width" from="0" to="130" begin="4.2s" dur="0.9s" calcMode="discrete" values="0;22;44;66;88;110;130" fill="freeze"/>
      </rect>
    </clipPath>
  </g>

  <!-- output 3 -->
  <text x="24" y="224" opacity="0">
    <tspan fill="#f2cc60">Python</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#f2cc60">Django</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#f2cc60">FastAPI</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#f2cc60">Next.js</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#f2cc60">PostgreSQL</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#f2cc60">Go</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#f2cc60">LLM APIs</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.2s" fill="freeze"/>
  </text>

  <!-- blinking cursor -->
  <rect x="24" y="236" width="9" height="17" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" begin="5.7s" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
